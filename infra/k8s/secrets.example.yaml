# Example Kubernetes Secret for QuAir / Quantum SEO.
#
# SECURITY:
#   - Do NOT commit a filled-in version of this file.
#   - Prefer: kubectl create secret generic quantum-seo-secrets -n quantum-seo \
#       --from-literal=DATABASE_URL='postgresql://...' \
#       --from-literal=JWT_SECRET="$(openssl rand -hex 32)" \
#       --from-literal=GOOGLE_CLIENT_ID='...' \
#       --from-literal=GOOGLE_CLIENT_SECRET='...' \
#       --from-literal=OAUTH_REDIRECT_BASE='https://your-domain'
#   - Or copy this file to secrets.local.yaml (gitignored), fill values, then kubectl apply.
#
# Apply the Namespace from quantum-seo.yaml before creating this Secret.
#
apiVersion: v1
kind: Secret
metadata:
  name: quantum-seo-secrets
  namespace: quantum-seo
type: Opaque
stringData:
  # Must match your Postgres deployment (user, password, host, db name).
  DATABASE_URL: ""
  # Min 32 chars; use openssl rand -hex 32
  JWT_SECRET: ""
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  OAUTH_REDIRECT_BASE: "https://your-app.example.com"
