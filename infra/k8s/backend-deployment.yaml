apiVersion: apps/v1
kind: Deployment
metadata:
  name: quantum-seo-backend
  namespace: quantum-seo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quantum-seo-backend
  template:
    metadata:
      labels:
        app: quantum-seo-backend
    spec:
      containers:
        - name: backend
          image: quantum-seo/backend:latest
          ports:
            - containerPort: 3000
          env:
            - name: ES_URL
              value: http://opensearch:9200
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: quantum-seo-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: quantum-seo-secrets
                  key: JWT_SECRET
            - name: REDIS_URL
              value: redis://redis:6379/0
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: quantum-seo
spec:
  selector:
    app: quantum-seo-backend
  ports:
    - port: 3000
      targetPort: 3000
